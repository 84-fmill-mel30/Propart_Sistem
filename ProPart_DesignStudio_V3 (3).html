<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProPart Design Studio V3</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@400;700&family=Lobster&family=Bebas+Neue&family=Righteous&family=Satisfy&family=Great+Vibes&family=Permanent+Marker&family=Black+Han+Sans&family=Russo+One&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Exo+2:wght@100;300;400;700;900&family=Barlow+Condensed:wght@300;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cinzel:wght@400;700;900&family=Abril+Fatface&family=Fredoka+One&family=Kaushan+Script&family=Alfa+Slab+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Exo 2',system-ui,sans-serif;background:#08080a;color:#b0b0b8;overflow:hidden;height:100vh;display:flex;flex-direction:column;user-select:none;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#333;border-radius:4px;}::-webkit-scrollbar-track{background:transparent;}
.hdr{height:46px;background:#111114;border-bottom:1px solid rgba(212,175,55,.12);display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0;z-index:20;}
.logo{display:flex;align-items:center;gap:8px;}
.logo b{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,#d4af37,#f5d76e);display:flex;align-items:center;justify-content:center;font-size:13px;color:#000;}
.logo span{color:#fff;font-weight:700;letter-spacing:.16em;font-size:10px;text-transform:uppercase;}
.logo span em{color:#d4af37;font-style:normal;}
.hdr-info{font-size:9px;color:#444;}
.hdr-r{display:flex;gap:5px;}
.btn-exp{display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,#d4af37,#f5d76e);color:#000;border:none;padding:5px 12px;border-radius:8px;font-weight:700;font-size:10px;cursor:pointer;}
.btn-exp:hover{filter:brightness(1.1);}
.btn-exp:disabled{opacity:.5;}
.wrap{flex:1;display:flex;overflow:hidden;min-height:0;}
.sb{width:255px;background:#111114;border-right:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
.sb-r{width:285px;background:#111114;border-left:1px solid rgba(255,255,255,.04);overflow-y:auto;flex-shrink:0;}
.sec{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);}
.sec-t{font-size:8px;font-weight:900;color:#555;text-transform:uppercase;letter-spacing:.14em;margin-bottom:7px;display:flex;align-items:center;gap:5px;cursor:pointer;}
.sec-t .arrow{margin-left:auto;font-size:7px;}
.bi{width:100%;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.03);border:none;color:#ccc;padding:7px 9px;border-radius:10px;cursor:pointer;font-size:10px;font-weight:700;text-align:left;margin-bottom:3px;}
.bi:hover{background:rgba(255,255,255,.06);}
.bi .ic{font-size:14px;width:18px;text-align:center;}
.mk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.mk-btn{padding:7px;border-radius:10px;border:1px solid rgba(255,255,255,.05);background:rgba(0,0,0,.4);color:#666;cursor:pointer;font-size:14px;text-align:center;}
.mk-btn.act{background:rgba(212,175,55,.1);border-color:#d4af37;color:#d4af37;}
.mk-btn:hover{color:#fff;}
.mk-lbl{font-size:8px;color:#555;text-align:center;margin-top:4px;}
.lib-tabs{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap;}
.lib-tab{padding:4px 8px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.3);color:#777;cursor:pointer;font-size:9px;font-weight:700;}
.lib-tab.act{background:rgba(212,175,55,.12);border-color:#d4af37;color:#d4af37;}
.lib-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;overflow-y:auto;max-height:260px;flex:1;}
.lib-item{width:100%;aspect-ratio:1;background:rgba(255,255,255,.03);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:2px solid transparent;padding:4px;position:relative;}
.lib-item:hover{border-color:#d4af37;background:rgba(255,255,255,.06);}
.lib-item img,.lib-item svg{width:100%;height:100%;object-fit:contain;}
.lib-item .lib-lbl{position:absolute;bottom:1px;left:0;right:0;text-align:center;font-size:6px;color:#888;background:rgba(0,0,0,.7);border-radius:0 0 6px 6px;padding:1px;}
.ly-item{display:flex;align-items:center;gap:5px;padding:3px 7px;border-radius:7px;font-size:9px;cursor:pointer;color:#888;}
.ly-item:hover{background:rgba(255,255,255,.04);}
.ly-item.act{background:rgba(212,175,55,.12);color:#d4af37;}
.ly-item .ln{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ly-item button{background:none;border:none;color:#666;cursor:pointer;font-size:10px;padding:1px 3px;}
.ly-item button:hover{color:#fff;}
.cv-area{flex:1;background:#08080a;display:flex;align-items:center;justify-content:center;position:relative;padding:20px;overflow:auto;}
.bg-bar{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:5px;background:#111114;padding:5px 7px;border-radius:10px;border:1px solid rgba(255,255,255,.04);z-index:10;}
.bg-bar span{font-size:8px;font-weight:700;text-transform:uppercase;color:#555;margin-right:3px;}
.bg-d{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.07);cursor:pointer;}
.bg-d.act{border-color:#d4af37;transform:scale(1.12);}
input[type=color].bg-c{width:18px;height:18px;border-radius:50%;border:1px solid rgba(255,255,255,.08);cursor:pointer;padding:0;background:transparent;}
.checker{background:repeating-conic-gradient(#bbb 0% 25%,#eee 0% 50%) 0 0/16px 16px;}
.dev{position:relative;transition:all .3s;}
.dev.phone{border:9px solid #1a1a1e;border-radius:2.2rem;box-shadow:0 0 50px rgba(0,0,0,.6);}
.dev.desk{box-shadow:0 6px 36px rgba(0,0,0,.5);border-radius:5px;}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:100px;height:18px;background:#1a1a1e;border-radius:0 0 14px 14px;z-index:50;}
.cv-inner{position:absolute;inset:0;overflow:hidden;}
.cv-inner.rphone{border-radius:1.6rem;}.cv-inner.rdesk{border-radius:3px;}
.cel{position:absolute;cursor:move;touch-action:none;}
.cel.sel{outline:2px solid #d4af37;outline-offset:2px;}
.cel .te{outline:none;white-space:pre-wrap;min-width:30px;line-height:1.25;}
.cel img{width:100%;height:100%;object-fit:contain;pointer-events:none;}
.ph{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:10px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:.14em;}
.ph em{color:#d4af37;font-style:normal;margin-right:5px;}
.pe{padding:30px 16px;text-align:center;color:#444;font-size:10px;line-height:1.6;}
.pb{padding:12px;display:flex;flex-direction:column;gap:10px;}
.qa{display:flex;gap:3px;flex-wrap:wrap;}
.qa button{flex:1;min-width:44px;padding:5px 3px;background:rgba(255,255,255,.04);border:none;color:#ccc;border-radius:7px;font-size:8px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:2px;}
.qa button:hover{background:rgba(255,255,255,.08);}
.qa .bd{color:#ff3b30;background:rgba(255,59,48,.07);}
.qa .bc{color:#4facfe;background:rgba(79,172,254,.07);}
.qa .bf{color:#34c759;background:rgba(52,199,89,.07);}
.t3d{padding:10px;border-radius:10px;border:1px solid rgba(212,175,55,.16);background:linear-gradient(135deg,rgba(212,175,55,.06),transparent);display:flex;justify-content:space-between;align-items:center;}
.t3d .l1{font-size:10px;font-weight:700;color:#fff;}.t3d .l2{font-size:8px;color:#666;}
.sw{position:relative;width:34px;height:18px;cursor:pointer;}
.sw input{display:none;}
.sw .sl{position:absolute;inset:0;background:#444;border-radius:18px;transition:.3s;}
.sw .sl::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.3s;}
.sw input:checked+.sl{background:#d4af37;}.sw input:checked+.sl::after{transform:translateX(16px);}
.cl{font-size:8px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:4px;display:block;}
input[type=range]{width:100%;accent-color:#d4af37;height:3px;}
.pr{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;}
.pr button{flex:1;padding:3px 4px;font-size:8px;border-radius:4px;border:1px solid rgba(255,255,255,.07);background:none;color:#666;cursor:pointer;white-space:nowrap;}
.pr button:hover{color:#fff;border-color:rgba(255,255,255,.16);}
.pr button.act{background:rgba(212,175,55,.13);border-color:#d4af37;color:#d4af37;}
select.cs{width:100%;background:#000;border:1px solid rgba(255,255,255,.07);padding:7px;border-radius:10px;font-size:10px;color:#fff;outline:none;}
select.cs:focus{border-color:#d4af37;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.ss{display:flex;align-items:center;gap:1px;background:#000;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:1px;}
.ss button{background:none;border:none;color:#888;cursor:pointer;padding:3px 5px;font-size:12px;}
.ss button:hover{color:#d4af37;}
.ss input{width:36px;background:none;border:none;text-align:center;font-size:10px;color:#fff;outline:none;}
.bw{width:100%;padding:6px;border-radius:8px;font-size:9px;font-weight:700;border:1px solid rgba(255,255,255,.07);cursor:pointer;text-align:center;}
.bw.on{background:#d4af37;color:#000;border-color:#d4af37;}.bw.off{background:#000;color:#fff;}
.cd{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
.cc{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.07);cursor:pointer;flex-shrink:0;}
.cc.act{border-color:#d4af37;transform:scale(1.1);}
input[type=color].cf{width:100%;height:28px;border-radius:10px;cursor:pointer;background:#000;border:1px solid rgba(255,255,255,.07);padding:1px;}
.posrow{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding-top:8px;border-top:1px solid rgba(255,255,255,.04);}
.posinp{display:flex;align-items:center;gap:4px;background:#000;border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:3px 6px;}
.posinp span{font-size:8px;color:#555;}
.posinp input{width:100%;background:none;border:none;font-size:10px;color:#fff;outline:none;text-align:right;}
input[type=text].url-inp{width:100%;background:#000;border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:6px 8px;font-size:9px;color:#fff;outline:none;}
input[type=text].url-inp:focus{border-color:#d4af37;}
.file-inp{display:none;}
.font-preview{padding:4px 6px;border-radius:6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);color:#fff;font-size:13px;text-align:center;margin-top:4px;min-height:26px;word-break:break-all;}
/* Style toggle pills */
.style-pills{display:flex;gap:4px;}
.style-pill{flex:1;padding:5px 4px;font-size:9px;font-weight:700;border:1px solid rgba(255,255,255,.1);border-radius:7px;background:rgba(0,0,0,.4);color:#666;cursor:pointer;text-align:center;transition:all .15s;}
.style-pill:hover{color:#fff;border-color:#888;}
.style-pill.on{background:rgba(212,175,55,.15);border-color:#d4af37;color:#d4af37;}
/* Animated halo in library */
@keyframes rotar{to{transform:rotate(360deg);}}
.halo-anim{animation:rotar 4s linear infinite;}
/* Gradient text swatch */
.gt-row{display:flex;gap:4px;flex-wrap:wrap;}
.gt-swatch{width:32px;height:22px;border-radius:5px;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.gt-swatch.act{border-color:#d4af37;}
/* Section divider */
.sdiv{font-size:8px;font-weight:900;color:#333;text-transform:uppercase;letter-spacing:2px;padding:6px 12px 3px;border-top:1px solid rgba(255,255,255,.03);}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo"><b>P</b><span>ProPart <em>Studio</em> <em style="color:#4facfe">V3</em></span></div>
  <div class="hdr-info" id="hdrInfo">Instagram 500×500 · 0 capas</div>
  <div class="hdr-r">
    <button class="btn-exp" onclick="exportPNG()" id="btnExport">⬇ GUARDAR PNG</button>
  </div>
</div>

<div class="wrap">

<!-- SIDEBAR LEFT -->
<div class="sb" id="sideLeft">

  <!-- INSERT -->
  <div class="sec">
    <div class="sec-t">✦ INSERTAR</div>
    <button class="bi" onclick="addText()"><span class="ic" style="color:#d4af37">T</span>Cuadro de Texto</button>
    <button class="bi" onclick="document.getElementById('fileInput').click()"><span class="ic" style="color:#34c759">📁</span>Subir Imagen</button>
    <input type="file" accept="image/*" class="file-inp" id="fileInput" onchange="handleUpload(event)">
    <!-- URL image insert -->
    <div style="display:flex;gap:4px;margin-top:4px;">
      <input type="text" class="url-inp" id="urlInp" placeholder="🌐 Pegar URL de imagen..." style="flex:1">
      <button class="bi" style="width:auto;padding:5px 9px;margin:0;flex-shrink:0;font-size:11px;" onclick="addFromURL()">+</button>
    </div>
  </div>

  <!-- MOCKUP -->
  <div class="sec">
    <div class="sec-t">📱 FORMATO</div>
    <div class="mk-grid" id="mkGrid"></div>
    <div class="mk-lbl" id="mkLabel"></div>
  </div>

  <!-- LAYERS -->
  <div class="sec">
    <div class="sec-t" onclick="toggleLayers()">◈ CAPAS (<span id="layerCount">0</span>) <span class="arrow" id="lyArrow">▸</span></div>
    <div id="layerList" style="display:none;max-height:110px;overflow-y:auto;"></div>
  </div>

  <!-- ASSET LIBRARY -->
  <div class="sec" style="flex:1;display:flex;flex-direction:column;min-height:0;">
    <div class="sec-t">🎨 BIBLIOTECA</div>
    <div class="lib-tabs" id="libTabs"></div>
    <div class="lib-grid" id="libGrid"></div>
  </div>

</div>

<!-- CANVAS -->
<div class="cv-area" id="cvArea">
  <div class="bg-bar" id="bgBar"></div>
  <div class="dev" id="devFrame">
    <div class="cv-inner" id="cvInner" onclick="selectEl(null)"></div>
    <div class="notch" id="notch" style="display:none"></div>
  </div>
</div>

<!-- SIDEBAR RIGHT — PROPS -->
<div class="sb-r" id="sideRight">
  <div class="ph"><em>◆</em> Propiedades</div>
  <div id="propsContent"><div class="pe">Selecciona un elemento<br>en el lienzo para editarlo</div></div>
</div>

</div>

<script>
// ═══════════════════════════
// TEMPLATES
// ═══════════════════════════
const TEMPLATES = [
  { id:'sq',  name:'Instagram Post',  w:500,  h:500,  phone:false },
  { id:'mo',  name:'Android App',     w:360,  h:800,  phone:true  },
  { id:'wd',  name:'Portada Web',     w:800,  h:450,  phone:false },
  { id:'st',  name:'Story',           w:1080, h:1920, phone:true  },
  { id:'card',name:'Tarjeta Negocio', w:600,  h:340,  phone:false },
];

// ═══════════════════════════
// FONTS — ampliado con cursivas, scripts, display, condensadas
// ═══════════════════════════
const FONTS = [
  // DISPLAY / IMPACTO
  { n:'Impact',           v:'Impact,sans-serif',        cat:'display' },
  { n:'Bebas Neue',       v:"'Bebas Neue',sans-serif",  cat:'display' },
  { n:'Russo One',        v:"'Russo One',sans-serif",   cat:'display' },
  { n:'Orbitron',         v:"'Orbitron',sans-serif",    cat:'display' },
  { n:'Rajdhani',         v:"'Rajdhani',sans-serif",    cat:'display' },
  { n:'Black Han Sans',   v:"'Black Han Sans',sans-serif", cat:'display' },
  // SCRIPT / CURSIVA
  { n:'Pacifico',         v:"'Pacifico',cursive",       cat:'script' },
  { n:'Dancing Script',   v:"'Dancing Script',cursive", cat:'script' },
  { n:'Lobster',          v:"'Lobster',cursive",        cat:'script' },
  { n:'Satisfy',          v:"'Satisfy',cursive",        cat:'script' },
  { n:'Great Vibes',      v:"'Great Vibes',cursive",    cat:'script' },
  { n:'Kaushan Script',   v:"'Kaushan Script',cursive", cat:'script' },
  { n:'Permanent Marker', v:"'Permanent Marker',cursive", cat:'script' },
  // ELEGANTE / SERIF
  { n:'Playfair Display', v:"'Playfair Display',serif", cat:'serif' },
  { n:'Cinzel',           v:"'Cinzel',serif",           cat:'serif' },
  { n:'Abril Fatface',    v:"'Abril Fatface',serif",    cat:'serif' },
  { n:'Georgia',          v:'Georgia,serif',            cat:'serif' },
  // SANS / MODERNA
  { n:'Exo 2',            v:"'Exo 2',sans-serif",       cat:'sans' },
  { n:'Barlow Condensed', v:"'Barlow Condensed',sans-serif", cat:'sans' },
  { n:'Fredoka One',      v:"'Fredoka One',sans-serif", cat:'sans' },
  { n:'Righteous',        v:"'Righteous',sans-serif",   cat:'sans' },
  // MONO
  { n:'Orbitron Mono',    v:"'Orbitron',monospace",     cat:'mono' },
  { n:'Courier New',      v:'Courier New,monospace',    cat:'mono' },
];

const QCOLORS=['#ffffff','#000000','#d4af37','#ff3b30','#4facfe','#34c759','#ff9500','#af52de','#ff2d55','#5856d6','#00c8ff','#ff6b6b','#ffd93d','#6bcb77','#c77dff','#f72585'];

const GRADIENTS = [
  { n:'Oro',      g:'linear-gradient(135deg,#d4af37,#f5d76e,#d4af37)' },
  { n:'Fuego',    g:'linear-gradient(135deg,#ff3b30,#ff9500,#ff2d55)' },
  { n:'Cielo',    g:'linear-gradient(135deg,#4facfe,#00f2fe)' },
  { n:'Neon',     g:'linear-gradient(135deg,#00c8ff,#a855f7)' },
  { n:'Bosque',   g:'linear-gradient(135deg,#34c759,#00c8ff)' },
  { n:'Púrpura',  g:'linear-gradient(135deg,#af52de,#ff2d55)' },
  { n:'Platino',  g:'linear-gradient(135deg,#ccc,#fff,#ccc)' },
  { n:'Arcoiris', g:'linear-gradient(135deg,#ff3b30,#ff9500,#ffd93d,#34c759,#4facfe,#af52de)' },
];

// ═══════════════════════════
// SVG HELPERS
// ═══════════════════════════
function mkSVG(inner, vb='0 0 100 100') {
  return `data:image/svg+xml;utf8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="${vb}" width="100" height="100">${inner}</svg>`)}`;
}

// ═══════════════════════════
// ASSETS
// ═══════════════════════════
const ASSETS = {
  coronas: [
    { n:'Corona Oro',    svg: mkSVG(`<polygon points="50,8 62,35 95,35 68,55 78,85 50,67 22,85 32,55 5,35 38,35" fill="#d4af37" stroke="#b8952d" stroke-width="2"/>`) },
    { n:'Corona Rey',    svg: mkSVG(`<path d="M15,70 L15,40 L30,55 L50,25 L70,55 L85,40 L85,70 Z" fill="#d4af37" stroke="#9a7b1f" stroke-width="2"/><rect x="15" y="70" width="70" height="12" rx="3" fill="#d4af37" stroke="#9a7b1f" stroke-width="2"/><circle cx="30" cy="48" r="4" fill="#ff3b30"/><circle cx="50" cy="30" r="4" fill="#4facfe"/><circle cx="70" cy="48" r="4" fill="#34c759"/>`) },
    { n:'Corona Simple', svg: mkSVG(`<path d="M20,75 L20,45 L35,60 L50,35 L65,60 L80,45 L80,75 Z" fill="none" stroke="#d4af37" stroke-width="4" stroke-linejoin="round"/><line x1="20" y1="75" x2="80" y2="75" stroke="#d4af37" stroke-width="4"/>`) },
    { n:'Laurel',        svg: mkSVG(`<path d="M50,85 Q30,70 25,50 Q20,30 35,15" fill="none" stroke="#34c759" stroke-width="3"/><path d="M50,85 Q70,70 75,50 Q80,30 65,15" fill="none" stroke="#34c759" stroke-width="3"/><ellipse cx="28" cy="55" rx="8" ry="5" fill="#34c759" transform="rotate(-30,28,55)"/><ellipse cx="24" cy="40" rx="8" ry="5" fill="#34c759" transform="rotate(-20,24,40)"/><ellipse cx="30" cy="28" rx="8" ry="5" fill="#34c759" transform="rotate(-10,30,28)"/><ellipse cx="72" cy="55" rx="8" ry="5" fill="#34c759" transform="rotate(30,72,55)"/><ellipse cx="76" cy="40" rx="8" ry="5" fill="#34c759" transform="rotate(20,76,40)"/><ellipse cx="70" cy="28" rx="8" ry="5" fill="#34c759" transform="rotate(10,70,28)"/>`) },

// ═══════════════════════════
// INIT
// ═══════════════════════════
function init() {
  renderMockups();
  renderBgBar();
  renderLibrary();
  applyTemplate();
  renderLayers();
  renderProps();
}

// ═══════════════════════════
// MOCKUPS
// ═══════════════════════════
function renderMockups() {
  const icons = {sq:'⬜',mo:'📱',wd:'🖥',st:'📱',card:'🪪'};
  document.getElementById('mkGrid').innerHTML = TEMPLATES.map(t=>
    `<button class="mk-btn ${tpl.id===t.id?'act':''}" onclick="setTemplate('${t.id}')">${icons[t.id]||'📄'}</button>`
  ).join('');
  document.getElementById('mkLabel').textContent = tpl.name;
}

function setTemplate(id) {
  tpl = TEMPLATES.find(t=>t.id===id);
  renderMockups();
  applyTemplate();
  updateInfo();
}

function applyTemplate() {
  const f = document.getElementById('devFrame');
  const inner = document.getElementById('cvInner');
  const notch = document.getElementById('notch');
  f.className = 'dev ' + (tpl.phone ? 'phone' : 'desk');
  f.style.width = '100%';
  f.style.maxWidth = (tpl.w > 600 ? '90%' : tpl.w + 'px');
  f.style.aspectRatio = tpl.w + '/' + tpl.h;

function handleUpload(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => addImageEl(ev.target.result);
  reader.readAsDataURL(file);
  e.target.value='';
}

function addFromURL() {
  const url = document.getElementById('urlInp').value.trim();
  if (!url) return;
  addImageEl(url);
  document.getElementById('urlInp').value='';
}

function addImageEl(src) {
  const el = {
    id:'el_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),

    x:40, y:40, w:180, h:180,

// ═══════════════════════════
// CANVAS RENDER
// ═══════════════════════════
function renderCanvas() {
  const inner = document.getElementById('cvInner');
  inner.querySelectorAll('.cel').forEach(e=>e.remove());
  els.filter(el=>el.visible).sort((a,b)=>a.z-b.z).forEach(el=>{
    const div = document.createElement('div');
    div.className='cel'+(selId===el.id?' sel':'');
    div.dataset.id=el.id;
    div.style.left=(el.x/tpl.w*100)+'%';
    div.style.top=(el.y/tpl.h*100)+'%';
    div.style.zIndex=el.z;
    div.style.opacity=el.opacity;
    let tx = `rotate(${el.rot||0}deg)`;
    if (el.is3D) tx += ' perspective(600px) rotateX(12deg) rotateY(-12deg) scale(1.05)';
    div.style.transform=tx;
    div.style.boxShadow=el.is3D?'12px 12px 30px rgba(0,0,0,.5)':'none';

    if (el.type==='text') {
      const t = document.createElement('div');
      t.className='te';
      t.contentEditable=true;
      t.textContent=el.content;
      applyTextStyle(t, el);
      t.onblur=()=>{const e=els.find(x=>x.id===el.id);if(e){e.content=t.textContent;}};
      t.onpointerdown=e=>e.stopPropagation();
      div.appendChild(t);
    } else {
      div.style.width=(el.w/tpl.w*100)+'%';
      div.style.height=(el.h/tpl.h*100)+'%';
      if (el.shadow) div.style.filter=`drop-shadow(0 ${el.shadow}px ${el.shadow*2}px ${el.shadowColor||'rgba(0,0,0,.5)'})`;
      const img=document.createElement('img');
      img.src=el.src; img.draggable=false;
      img.style.borderRadius=(el.radius||0)+'px';
      div.appendChild(img);
    }
    div.onpointerdown=e=>startDrag(e,el.id);
    inner.appendChild(div);
  });
}

function applyTextStyle(el, data) {
  el.style.color = data.useGradient ? 'transparent' : data.color;
  el.style.fontSize = data.fontSize+'px';
  el.style.fontFamily = data.fontFamily;
  el.style.fontWeight = data.fontWeight||400;
  el.style.fontStyle = data.fontStyle||'normal';
  el.style.textDecoration = data.textDecoration||'none';
  el.style.textTransform = data.textTransform||'none';
  el.style.letterSpacing = (data.letterSpacing||0)+'px';
  el.style.lineHeight = data.lineHeight||1.25;
  el.style.textShadow = data.textShadow||'';
  el.style.webkitTextStroke = data.strokeWidth ? `${data.strokeWidth}px ${data.strokeColor||'#000'}` : '';
  if (data.bgColor) { el.style.backgroundColor=data.bgColor; el.style.padding=(data.bgPad||4)+'px '+(data.bgPad||8)+'px'; el.style.borderRadius='4px'; }
  else { el.style.backgroundColor=''; el.style.padding=''; }
  if (data.useGradient) {
    el.style.backgroundImage = data.gradient;
    el.style.webkitBackgroundClip='text';
    el.style.backgroundClip='text';
  } else {
    el.style.backgroundImage='';
    el.style.webkitBackgroundClip='';
    el.style.backgroundClip='';
  }
}

// ═══════════════════════════
// DRAG
// ═══════════════════════════
function startDrag(e,id) {
  e.stopPropagation();
  selId=id; dragging=true;
  const inner=document.getElementById('cvInner');
  const rect=inner.getBoundingClientRect();
  const el=els.find(x=>x.id===id);
  dragOff.x=(e.clientX-rect.left)*(tpl.w/rect.width)-el.x;
  dragOff.y=(e.clientY-rect.top)*(tpl.h/rect.height)-el.y;
  renderCanvas(); renderLayers(); renderProps();
}
document.addEventListener('pointermove',e=>{
  if(!dragging||!selId) return;
  const inner=document.getElementById('cvInner');
  const rect=inner.getBoundingClientRect();
  const el=els.find(x=>x.id===selId);
  if(!el) return;
  el.x=(e.clientX-rect.left)*(tpl.w/rect.width)-dragOff.x;
  el.y=(e.clientY-rect.top)*(tpl.h/rect.height)-dragOff.y;
  const div=inner.querySelector(`[data-id="${selId}"]`);
  if(div){div.style.left=(el.x/tpl.w*100)+'%';div.style.top=(el.y/tpl.h*100)+'%';}
});
document.addEventListener('pointerup',()=>{if(dragging){dragging=false;renderProps();}});

function selectEl(id) {selId=id;renderCanvas();renderLayers();renderProps();}

// LAYERS
// ═══════════════════════════
let showLayers=false;
function toggleLayers(){
  showLayers=!showLayers;
  document.getElementById('lyArrow').textContent=showLayers?'▾':'▸';
  document.getElementById('layerList').style.display=showLayers?'block':'none';
  renderLayers();
}
function renderLayers(){
  document.getElementById('layerCount').textContent=els.length;
  if(!showLayers) return;
  const list=document.getElementById('layerList');
  list.innerHTML=[...els].sort((a,b)=>b.z-a.z).map(el=>{
    const name=el.type==='text'?'T: '+(el.content||'').slice(0,12):'🖼 Imagen';
    return `<div class="ly-item ${selId===el.id?'act':''}" onclick="selectEl('${el.id}')">
      <span class="ln">${name}</span>
      <button onclick="event.stopPropagation();toggleVis('${el.id}')">${el.visible?'👁':'🚫'}</button>
    </div>`;
  }).join('');
}
function toggleVis(id){const el=els.find(x=>x.id===id);if(el){el.visible=!el.visible;renderCanvas();renderLayers();}}

  // ── Position ──
  h+=`<div class="posrow">
    <div class="posinp"><span>X</span><input type="number" value="${Math.round(el.x)}" onchange="updEl('${el.id}',{x:+this.value})"></div>
    <div class="posinp"><span>Y</span><input type="number" value="${Math.round(el.y)}" onchange="updEl('${el.id}',{y:+this.value})"></div>
  </div>`;

  h+='</div>';
  box.innerHTML=h;
}

function replaceImgUrl(id){
  const url=document.getElementById('replaceUrl')?.value?.trim();
  if(url) updEl(id,{src:url});
}

function setFontFilter(cat,elId){
  fontFilter=cat;
  renderProps();
}

// ═══════════════════════════
// ELEMENT OPERATIONS
// ═══════════════════════════
function updEl(id,props){
  const el=els.find(x=>x.id===id);
  if(!el) return;
  Object.assign(el,props);
  renderCanvas();
  renderProps();
}

function moveZ(id,dir){
  const el=els.find(x=>x.id===id);
  if(el){el.z=Math.max(1,el.z+dir);renderCanvas();renderLayers();renderProps();}
}

function sendToZ(id,where){
  const el=els.find(x=>x.id===id);
  if(!el) return;
  const maxZ=Math.max(...els.map(e=>e.z));
  const minZ=Math.min(...els.map(e=>e.z));
  el.z=where==='front'?maxZ+1:Math.max(1,minZ-1);
  renderCanvas();renderLayers();renderProps();
}

function dupEl(id){
  const src=els.find(x=>x.id===id);
  if(!src) return;
  const clone={...src,id:'el_'+Date.now()+'_dup',x:src.x+20,y:src.y+20,z:els.length+1};
  els.push(clone);
  selId=clone.id;
  renderCanvas();renderLayers();renderProps();updateInfo();
}

function delEl(id){
  els=els.filter(x=>x.id!==id);
  selId=null;
  renderCanvas();renderLayers();renderProps();updateInfo();
}

function updateInfo(){
  document.getElementById('hdrInfo').textContent=`${tpl.name} ${tpl.w}×${tpl.h} · ${els.length} capa${els.length!==1?'s':''}`;
}

// ═══════════════════════════
// EXPORT PNG
// ═══════════════════════════
async function exportPNG(){
  const btn=document.getElementById('btnExport');
  btn.disabled=true;btn.textContent='⏳ Exportando...';
  try{
    const c=document.createElement('canvas');
    c.width=tpl.w;c.height=tpl.h;
    const ctx=c.getContext('2d');
    if(bgColor!=='transparent'){ctx.fillStyle=bgColor;ctx.fillRect(0,0,c.width,c.height);}
    const sorted=[...els].filter(e=>e.visible).sort((a,b)=>a.z-b.z);
    for(const el of sorted){
      ctx.save();
      ctx.globalAlpha=el.opacity??1;
      if(el.type==='text'){
        const fw=el.fontWeight||400;
        const fi=el.fontStyle==='italic'?'italic':'normal';
        ctx.translate(el.x,el.y);
        ctx.rotate((el.rot||0)*Math.PI/180);
        ctx.font=`${fi} ${fw} ${el.fontSize}px ${el.fontFamily}`;
        ctx.textBaseline='top';
        ctx.letterSpacing=(el.letterSpacing||0)+'px';
        if(el.textShadow&&el.textShadow.includes('px')){
          const parts=el.textShadow.split('px');
          ctx.shadowColor=el.color;
          ctx.shadowBlur=10;
        }
        if(el.bgColor){
          const lines=(el.content||'').split('\n');
          const maxW=Math.max(...lines.map(l=>ctx.measureText(l).width));
          const pad=el.bgPad||4;
          ctx.fillStyle=el.bgColor;
          ctx.fillRect(-pad,-pad,maxW+pad*2,lines.length*el.fontSize*1.25+pad*2);
        }
        if(el.useGradient){
          const lines=(el.content||'').split('\n');
          const maxW=Math.max(1,...lines.map(l=>ctx.measureText(l).width));
          const grad=ctx.createLinearGradient(0,0,maxW,el.fontSize);
          grad.addColorStop(0,el.color);
          grad.addColorStop(1,'#f5d76e');
          ctx.fillStyle=grad;
        } else {
          ctx.fillStyle=el.color;
        }
        const transform=el.textTransform||'none';
        (el.content||'').split('\n').forEach((ln,i)=>{
          let txt=ln;
          if(transform==='uppercase')txt=txt.toUpperCase();
          else if(transform==='lowercase')txt=txt.toLowerCase();
          else if(transform==='capitalize')txt=txt.replace(/\b\w/g,c=>c.toUpperCase());
          if(el.strokeWidth){ctx.lineWidth=el.strokeWidth;ctx.strokeStyle=el.strokeColor||'#000';ctx.strokeText(txt,0,i*el.fontSize*1.25);}
          ctx.fillText(txt,0,i*el.fontSize*1.25);
        });
      }
      if(el.type==='image'){
        ctx.translate(el.x+el.w/2,el.y+el.h/2);
        ctx.rotate((el.rot||0)*Math.PI/180);
        if(el.shadow){ctx.shadowColor=el.shadowColor||'rgba(0,0,0,.5)';ctx.shadowBlur=el.shadow*2;ctx.shadowOffsetY=el.shadow;}
        try{
          const img=new Image();
          img.crossOrigin='anonymous';
          await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=el.src;});
          if(el.radius&&el.radius>0){
            ctx.beginPath();
            const r=Math.min(el.radius,el.w/2,el.h/2);
            ctx.roundRect(-el.w/2,-el.h/2,el.w,el.h,r);
            ctx.clip();
          }
          ctx.drawImage(img,-el.w/2,-el.h/2,el.w,el.h);
        }catch{ctx.fillStyle='#333';ctx.fillRect(-el.w/2,-el.h/2,el.w,el.h);}
      }
      ctx.restore();
    }
    const a=document.createElement('a');
    a.download=`propart-${Date.now()}.png`;
    a.href=c.toDataURL('image/png');
    a.click();
  }catch(err){console.error(err);}
  btn.disabled=false;btn.textContent='⬇ GUARDAR PNG';
}

// ═══════════════════════════
// START

init();
</script>
